<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Document</title>
</head>
<body>
    <header class="">
        <img src="../croco.png" alt="">
    </header>
    <div class="container flex1">
        <div class="z1">
            <div class="z1__wrapper">
                <div class="z1__left">
                    <div class="sqs">
                        <div class="sq"></div>
                        <div class="sq"></div>
                        <div class="sq"></div>
                        <div class="sq"></div>
                    </div>
                </div>

                <div class="z1__right">

                    <div class="code">
                        <div class="code__row">
                            <p>display:</p>
                            <p>flex</p>
                        </div>
                        
                        <form id="form">

                        <label for="ask">
                            <p>flex-direction</p>
                            <input type="text" id="ask"></label>
                        
                    </form>
                    </div>
                    
                   
                </div>
            </div>
             <p class="message"></p>
        </div>

         <div class="progress-container"> 
            
               <div class="btns-nav-lessons">
                 <a href="./1.html" class="btn back"><</a>
            <a class="btn forward">></a>
               </div>
           

        <div class="progress">
            <div class="progress__line">
              <div class="progress_val"></div>
            </div>
        </div>
           </div>

       
    </div>


    <script>
        let progress = 2
        let countTrains = 4
        const progressVal = document.querySelector('.progress_val')
        progressVal.style.width = (progress/countTrains)*100 + `%` 
        console.log( progressVal.style.width)
        window.addEventListener('DOMContentLoaded', ()=>{
        const sqs = document.querySelector('.sqs')
        const form = document.getElementById('form')
        const input = document.querySelector('#form input[type="text"]')
        let inputValue = ''
        input?.addEventListener('input', (e)=>{
            inputValue = e.target.value
            
        })
        console.log(inputValue)
        
        const message = document.querySelector('.message')
        sqs.style.flexDirection = 'column'
        let sms = ''
        form.addEventListener('submit', (e)=>{
            e.preventDefault()
           
            
           
            if(inputValue === 'row'){
                message.innerText = 'true'
                sqs.style.flexDirection = 'row'
                progress = 2
            }else{
                
                 message.innerText = 'think again'
            }
        })
        })
       
    </script>
</body>
</html>
